<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>恬恬的熱量紀錄 App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #0f172a;
      --soft: #f1f5f9;
      --danger: #dc2626;
      --radius: 20px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 460px;
      margin: 0 auto;
      padding: 16px 14px 32px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 6px 0 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .metric-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }

    .macro-label { color: var(--muted); font-size: 12px; }
    .macro-value { font-size: 20px; font-weight: 700; margin-top: 4px; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      border: 0;
      background: var(--card);
      border-radius: 16px;
      padding: 12px 8px;
      font-weight: 700;
      color: var(--muted);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .chip button {
      border: 0;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      padding: 0;
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 12px;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stack { display: grid; gap: 12px; }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-soft {
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .meal-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meal-btn {
      border: 1px solid var(--line);
      background: #fff;
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .meal-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .entry {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 10px;
    }

    .entry-title { font-weight: 800; }
    .entry-sub, .entry-meta { color: var(--muted); font-size: 13px; margin-top: 3px; }

    .icon-btn {
      border: 0;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    .search-box {
      border: 1px dashed var(--line);
      background: var(--soft);
      border-radius: 18px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .footer-tip {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      margin-top: 16px;
    }

    canvas {
      width: 100% !important;
      max-height: 280px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">飲食紀錄 App</div>
    <div class="subtitle">熱量、三大營養素、體重趨勢、運動消耗</div>

    <div class="grid-2">
      <div class="card">
        <div class="metric-label">今日熱量</div>
        <div class="metric-value" id="totalCalories">0</div>
        <div class="metric-sub">kcal</div>
      </div>
      <div class="card">
        <div class="metric-label">淨熱量</div>
        <div class="metric-value" id="netCalories">0</div>
        <div class="metric-sub" id="burnedText">已扣運動 0 kcal</div>
      </div>
    </div>

    <div class="card">
      <div class="macro-grid">
        <div>
          <div class="macro-label">蛋白質</div>
          <div class="macro-value" id="totalProtein">0g</div>
        </div>
        <div>
          <div class="macro-label">碳水</div>
          <div class="macro-value" id="totalCarbs">0g</div>
        </div>
        <div>
          <div class="macro-label">脂肪</div>
          <div class="macro-value" id="totalFat">0g</div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="food">飲食</button>
      <button class="tab" data-tab="exercise">運動</button>
      <button class="tab" data-tab="weight">體重</button>
      <button class="tab" data-tab="search">搜尋</button>
    </div>

    <div class="panel active" id="panel-food">
      <div class="card">
        <div class="section-title">快速新增常吃食物</div>
        <div class="chips" id="quickFoodsList"></div>
      </div>

      <div class="card">
        <div class="section-title">新增常吃食物按鈕</div>
        <div class="stack">
          <div>
            <label>名稱</label>
            <input id="quickName" placeholder="例如：地瓜" />
          </div>
          <div class="row-2">
            <div>
              <label>熱量</label>
              <input id="quickCalories" type="number" placeholder="kcal" />
            </div>
            <div>
              <label>蛋白質</label>
              <input id="quickProtein" type="number" placeholder="g" />
            </div>
            <div>
              <label>碳水</label>
              <input id="quickCarbs" type="number" placeholder="g" />
            </div>
            <div>
              <label>脂肪</label>
              <input id="quickFat" type="number" placeholder="g" />
            </div>
          </div>
          <button class="btn btn-primary" id="addQuickFoodBtn">儲存為常吃食物</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">手動新增飲食</div>
        <div class="stack">
          <div class="row-2">
            <div>
              <label>日期</label>
              <input id="foodDate" type="date" />
            </div>
            <div>
              <label>時間</label>
              <input id="foodTime" type="time" />
            </div>
          </div>

          <div>
            <label>餐別</label>
            <div class="meal-buttons" id="mealButtons"></div>
          </div>

          <div>
            <label>食物名稱</label>
            <input id="foodName" placeholder="例如：全家茶葉蛋" />
          </div>

          <div class="row-2">
            <div>
              <label>熱量</label>
              <input id="foodCalories" type="number" placeholder="kcal" />
            </div>
            <div>
              <label>蛋白質</label>
              <input id="foodProtein" type="number" placeholder="g" />
            </div>
            <div>
              <label>碳水</label>
              <input id="foodCarbs" type="number" placeholder="g" />
            </div>
            <div>
              <label>脂肪</label>
              <input id="foodFat" type="number" placeholder="g" />
            </div>
          </div>

          <button class="btn btn-primary" id="addFoodBtn">新增飲食紀錄</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">今日飲食</div>
        <div id="todayFoods"></div>
      </div>
    </div>

    <div class="panel" id="panel-exercise">
      <div class="card">
        <div class="section-title">新增運動消耗</div>
        <div class="stack">
          <div>
            <label>日期</label>
            <input id="exerciseDate" type="date" />
          </div>
          <div>
            <label>運動項目</label>
            <input id="exerciseName" placeholder="例如：重訓 / 登階機" />
          </div>
          <div class="row-2">
            <div>
              <label>消耗熱量</label>
              <input id="exerciseCalories" type="number" placeholder="kcal" />
            </div>
            <div>
              <label>時長</label>
              <input id="exerciseDuration" placeholder="例如：40 分鐘" />
            </div>
          </div>
          <button class="btn btn-primary" id="addExerciseBtn">新增運動</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">今日運動</div>
        <div id="todayExercises"></div>
      </div>
    </div>

    <div class="panel" id="panel-weight">
      <div class="card">
        <div class="section-title">體重紀錄</div>
        <div class="stack">
          <div class="row-2">
            <div>
              <label>日期</label>
              <input id="weightDate" type="date" />
            </div>
            <div>
              <label>體重</label>
              <input id="weightValue" type="number" step="0.1" placeholder="kg" />
            </div>
          </div>
          <button class="btn btn-primary" id="addWeightBtn">新增 / 更新體重</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">每日體重折線圖</div>
        <canvas id="weightChart"></canvas>
      </div>

      <div class="card">
        <div class="section-title">歷史體重</div>
        <div id="weightHistory"></div>
      </div>
    </div>

    <div class="panel" id="panel-search">
      <div class="card">
        <div class="section-title">預留：搜尋食物功能</div>
        <div class="stack">
          <div>
            <label>搜尋關鍵字</label>
            <input placeholder="例如：全家茶葉蛋" />
          </div>
          <div class="search-box">
            這一區已預留給未來的「即時搜尋食物營養資料」功能。之後可以接品牌商品搜尋、常吃食物資料庫，以及一鍵加入飲食紀錄。
          </div>
        </div>
      </div>
    </div>

    <div class="footer-tip">資料會自動保存在這台手機 / 瀏覽器中。</div>
  </div>

  <script>
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const nowTime = () => new Date().toTimeString().slice(0, 5);
    const meals = ["早餐", "午餐", "晚餐", "點心"];

    const defaultQuickFoods = [
      { name: "全家茶葉蛋", calories: 70, protein: 6, carbs: 1, fat: 5 },
      { name: "無糖豆漿", calories: 120, protein: 12, carbs: 6, fat: 5 },
      { name: "雞胸肉", calories: 120, protein: 23, carbs: 0, fat: 2 },
      { name: "高蛋白粉", calories: 150, protein: 27, carbs: 5, fat: 2 },
      { name: "7-11 沙拉", calories: 160, protein: 8, carbs: 10, fat: 9 },
      { name: "茶葉蛋", calories: 75, protein: 6, carbs: 1, fat: 5 }
    ];

    const load = (key, fallback) => {
      const saved = localStorage.getItem(key);
      return saved ? JSON.parse(saved) : fallback;
    };

    let quickFoods = load("tt_quick_foods", defaultQuickFoods);
    let foodEntries = load("tt_food_entries", []);
    let exerciseEntries = load("tt_exercise_entries", []);
    let weightEntries = load("tt_weight_entries", [{ id: Date.now(), date: todayStr(), weight: 52.8 }]);
    let selectedMeal = "早餐";
    let chart;

    const saveAll = () => {
      localStorage.setItem("tt_quick_foods", JSON.stringify(quickFoods));
      localStorage.setItem("tt_food_entries", JSON.stringify(foodEntries));
      localStorage.setItem("tt_exercise_entries", JSON.stringify(exerciseEntries));
      localStorage.setItem("tt_weight_entries", JSON.stringify(weightEntries));
    };

    const setDefaults = () => {
      document.getElementById("foodDate").value = todayStr();
      document.getElementById("foodTime").value = nowTime();
      document.getElementById("exerciseDate").value = todayStr();
      document.getElementById("weightDate").value = todayStr();
    };

    const renderMealButtons = () => {
      const wrap = document.getElementById("mealButtons");
      wrap.innerHTML = meals.map(meal => `
        <button class="meal-btn ${selectedMeal === meal ? "active" : ""}" data-meal="${meal}">${meal}</button>
      `).join("");

      wrap.querySelectorAll(".meal-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedMeal = btn.dataset.meal;
          renderMealButtons();
        });
      });
    };

    const renderQuickFoods = () => {
      const wrap = document.getElementById("quickFoodsList");
      if (!quickFoods.length) {
        wrap.innerHTML = '<div class="empty">目前還沒有常吃食物</div>';
        return;
      }
      wrap.innerHTML = quickFoods.map(food => `
        <div class="chip">
          <span class="chip-add" data-name="${food.name}">+ ${food.name}</span>
          <button data-delete="${food.name}">✕</button>
        </div>
      `).join("");

      wrap.querySelectorAll(".chip-add").forEach(el => {
        el.style.cursor = "pointer";
        el.addEventListener("click", () => {
          const food = quickFoods.find(f => f.name === el.dataset.name);
          if (!food) return;
          foodEntries.unshift({
            id: Date.now(),
            date: todayStr(),
            time: nowTime(),
            meal: "點心",
            ...food
          });
          saveAll();
          renderAll();
        });
      });

      wrap.querySelectorAll("button[data-delete]").forEach(btn => {
        btn.addEventListener("click", () => {
          quickFoods = quickFoods.filter(f => f.name !== btn.dataset.delete);
          saveAll();
          renderAll();
        });
      });
    };

    const getTodayFoods = () => foodEntries.filter(x => x.date === todayStr());
    const getTodayExercises = () => exerciseEntries.filter(x => x.date === todayStr());

    const renderSummary = () => {
      const todayFoods = getTodayFoods();
      const todayExercises = getTodayExercises();
      const totals = todayFoods.reduce((acc, x) => ({
        calories: acc.calories + Number(x.calories || 0),
        protein: acc.protein + Number(x.protein || 0),
        carbs: acc.carbs + Number(x.carbs || 0),
        fat: acc.fat + Number(x.fat || 0)
      }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
      const burned = todayExercises.reduce((sum, x) => sum + Number(x.caloriesBurned || 0), 0);
      document.getElementById("totalCalories").textContent = totals.calories;
      document.getElementById("netCalories").textContent = totals.calories - burned;
      document.getElementById("burnedText").textContent = `已扣運動 ${burned} kcal`;
      document.getElementById("totalProtein").textContent = `${totals.protein}g`;
      document.getElementById("totalCarbs").textContent = `${totals.carbs}g`;
      document.getElementById("totalFat").textContent = `${totals.fat}g`;
    };

    const renderFoods = () => {
      const wrap = document.getElementById("todayFoods");
      const items = getTodayFoods();
      if (!items.length) {
        wrap.innerHTML = '<div class="empty">今天還沒有飲食紀錄</div>';
        return;
      }
      wrap.innerHTML = items.map(item => `
        <div class="entry">
          <div>
            <div class="entry-title">${item.name}</div>
            <div class="entry-sub">${item.meal} · ${item.time}</div>
            <div class="entry-meta">${item.calories} kcal · P ${item.protein} / C ${item.carbs} / F ${item.fat}</div>
          </div>
          <button class="icon-btn" data-id="${item.id}">🗑</button>
        </div>
      `).join("");

      wrap.querySelectorAll("button[data-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          foodEntries = foodEntries.filter(x => String(x.id) !== btn.dataset.id);
          saveAll();
          renderAll();
        });
      });
    };

    const renderExercises = () => {
      const wrap = document.getElementById("todayExercises");
      const items = getTodayExercises();
      if (!items.length) {
        wrap.innerHTML = '<div class="empty">今天還沒有運動紀錄</div>';
        return;
      }
      wrap.innerHTML = items.map(item => `
        <div class="entry">
          <div>
            <div class="entry-title">${item.name}</div>
            <div class="entry-meta">${item.caloriesBurned} kcal${item.duration ? ` · ${item.duration}` : ""}</div>
          </div>
          <button class="icon-btn" data-id="${item.id}">🗑</button>
        </div>
      `).join("");

      wrap.querySelectorAll("button[data-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          exerciseEntries = exerciseEntries.filter(x => String(x.id) !== btn.dataset.id);
          saveAll();
          renderAll();
        });
      });
    };

    const renderWeights = () => {
      const historyWrap = document.getElementById("weightHistory");
      const sorted = [...weightEntries].sort((a, b) => a.date.localeCompare(b.date));

      if (!sorted.length) {
        historyWrap.innerHTML = '<div class="empty">目前還沒有體重紀錄</div>';
      } else {
        historyWrap.innerHTML = sorted.map(item => `
          <div class="entry">
            <div>
              <div class="entry-title">${item.date}</div>
              <div class="entry-meta">${item.weight} kg</div>
            </div>
            <button class="icon-btn" data-id="${item.id}">🗑</button>
          </div>
        `).join("");
      }

      historyWrap.querySelectorAll("button[data-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          weightEntries = weightEntries.filter(x => String(x.id) !== btn.dataset.id);
          saveAll();
          renderAll();
        });
      });

      const ctx = document.getElementById("weightChart");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: sorted.map(x => x.date),
          datasets: [{
            label: '體重 (kg)',
            data: sorted.map(x => x.weight),
            tension: 0.3,
            borderWidth: 3,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => `體重：${ctx.raw} kg`
              }
            }
          },
          scales: {
            y: {
              ticks: { callback: value => `${value}kg` }
            }
          }
        }
      });
    };

    const renderTabs = () => {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
        });
      });
    };

    const clearFoodInputs = () => {
      document.getElementById('foodName').value = '';
      document.getElementById('foodCalories').value = '';
      document.getElementById('foodProtein').value = '';
      document.getElementById('foodCarbs').value = '';
      document.getElementById('foodFat').value = '';
      document.getElementById('foodTime').value = nowTime();
    };

    const bindActions = () => {
      document.getElementById('addFoodBtn').onclick = () => {
        const name = document.getElementById('foodName').value.trim();
        const calories = document.getElementById('foodCalories').value;
        if (!name || calories === '') return;
        foodEntries.unshift({
          id: Date.now(),
          date: document.getElementById('foodDate').value,
          time: document.getElementById('foodTime').value,
          meal: selectedMeal,
          name,
          calories: Number(calories),
          protein: Number(document.getElementById('foodProtein').value || 0),
          carbs: Number(document.getElementById('foodCarbs').value || 0),
          fat: Number(document.getElementById('foodFat').value || 0)
        });
        saveAll();
        clearFoodInputs();
        renderAll();
      };

      document.getElementById('addExerciseBtn').onclick = () => {
        const name = document.getElementById('exerciseName').value.trim();
        const caloriesBurned = document.getElementById('exerciseCalories').value;
        if (!name || caloriesBurned === '') return;
        exerciseEntries.unshift({
          id: Date.now(),
          date: document.getElementById('exerciseDate').value,
          name,
          caloriesBurned: Number(caloriesBurned),
          duration: document.getElementById('exerciseDuration').value.trim()
        });
        saveAll();
        document.getElementById('exerciseName').value = '';
        document.getElementById('exerciseCalories').value = '';
        document.getElementById('exerciseDuration').value = '';
        renderAll();
      };

      document.getElementById('addWeightBtn').onclick = () => {
        const date = document.getElementById('weightDate').value;
        const weight = document.getElementById('weightValue').value;
        if (!date || weight === '') return;
        weightEntries = weightEntries.filter(x => x.date !== date);
        weightEntries.push({ id: Date.now(), date, weight: Number(weight) });
        saveAll();
        document.getElementById('weightValue').value = '';
        renderAll();
      };

      document.getElementById('addQuickFoodBtn').onclick = () => {
        const name = document.getElementById('quickName').value.trim();
        const calories = document.getElementById('quickCalories').value;
        if (!name || calories === '') return;
        quickFoods.unshift({
          name,
          calories: Number(calories),
          protein: Number(document.getElementById('quickProtein').value || 0),
          carbs: Number(document.getElementById('quickCarbs').value || 0),
          fat: Number(document.getElementById('quickFat').value || 0)
        });
        saveAll();
        document.getElementById('quickName').value = '';
        document.getElementById('quickCalories').value = '';
        document.getElementById('quickProtein').value = '';
        document.getElementById('quickCarbs').value = '';
        document.getElementById('quickFat').value = '';
        renderAll();
      };
    };

    const renderAll = () => {
      renderMealButtons();
      renderQuickFoods();
      renderSummary();
      renderFoods();
      renderExercises();
      renderWeights();
    };

    setDefaults();
    renderTabs();
    bindActions();
    renderAll();
  </script>
</body>
</html>
